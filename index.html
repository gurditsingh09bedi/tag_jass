<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JAPP Financial</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Orbitron',sans-serif;
background:#000;
color:white;
text-align:center;
overflow-x:hidden;
}

/* Background Video */

.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* Overlay */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:-1;
}

/* Main Container */

.container{
width:100%;
max-width:420px;
margin:auto;
padding:25px 18px;
}

/* Logo */

.logo{
width:140px;
margin:auto;
display:block;
margin-bottom:20px;
cursor:pointer;

filter:
drop-shadow(0 0 15px #00e5ff)
drop-shadow(0 0 35px #4f7cff);

animation:float 4s ease-in-out infinite;
}

@keyframes float{

0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}

}

/* Text */

.type{
font-size:18px;
margin-bottom:10px;
min-height:24px;
color:#00e5ff;
}

h1{
font-size:26px;
margin-bottom:6px;
}

.tagline{
font-size:14px;
margin-bottom:25px;
opacity:.85;
}

/* Buttons */

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

/* Button Style */

.btn{

display:flex;
justify-content:center;
align-items:center;

width:100%;
padding:14px;

border-radius:12px;

text-decoration:none;
font-size:15px;
font-weight:600;

color:white;

background:rgba(255,255,255,0.08);

border:1px solid rgba(255,255,255,0.2);

backdrop-filter:blur(10px);

transition:.2s;

}

.btn:hover{
transform:translateY(-3px);
background:rgba(255,255,255,0.15);
}

/* Save Contact Button */

.save{
grid-column:span 2;
background:linear-gradient(135deg,#00e5ff,#4f7cff);
border:none;
}

/* Mobile Fix */

@media (max-width:480px){

.container{
padding:25px 16px;
}

.buttons{
grid-template-columns:1fr;
}

.save{
grid-column:span 1;
}

}

</style>
</head>

<body>

<video class="bg-video" autoplay muted loop playsinline>
<source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

<img src="logo.png" class="logo" id="logo">

<div class="type" id="type"></div>

<h1>JAPP Financial</h1>

<div class="tagline">
We build smart digital experiences
</div>

<div class="buttons">

<a class="btn" href="tel:+447877810779">📞 Call</a>

<a class="btn" href="mailto:jas@jappfinancial.co.uk">📧 Email</a>

<a class="btn" href="https://x.com" target="_blank">🐦 X</a>

<a class="btn" href="https://facebook.com" target="_blank">📘 Facebook</a>

<a class="btn" href="https://instagram.com/japp_financial" target="_blank">📸 Instagram</a>

<a class="btn" href="https://yourwebsite.com" target="_blank">🌐 Website</a>

<a class="btn" href="https://linkedin.com" target="_blank">💼 LinkedIn</a>

<a class="btn" href="https://wa.me/447877810779" target="_blank">💬 WhatsApp</a>

<a class="btn save" href="contact.vcf">💾 Save Contact</a>

</div>

</div>

<script>

/* typing animation */

const lines=[
"JAPP Financial",
"AI Powered Digital Card",
"Tap logo to hear voice"
];

let i=0;
let j=0;
let deleting=false;

const el=document.getElementById("type");

function type(){

let text=lines[i];

if(!deleting){

el.textContent=text.slice(0,++j);

if(j===text.length){

deleting=true;
setTimeout(type,1200);
return;

}

}else{

el.textContent=text.slice(0,--j);

if(j===0){

deleting=false;
i=(i+1)%lines.length;

}

}

setTimeout(type,60);

}

type();


/* Voice when logo tapped */

document.getElementById("logo").onclick=function(){

const msg=new SpeechSynthesisUtterance(
"Welcome to JAPP Financial digital card. Tap any button to connect instantly."
);

speechSynthesis.speak(msg);

}

</script>

</body>
</html>
