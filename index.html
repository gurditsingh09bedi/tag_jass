<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Futuristic Digital Card</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&display=swap" rel="stylesheet">

<style>
:root{
  --blue:#4f7cff;
  --cyan:#00e5ff;
  --text:#f0f0f0;
  --bg:#020617;
}

*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  color:var(--text);
  overflow:hidden;
  text-align:center;
  background:var(--bg);
}

/* Background video */
.bg-video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
  filter:brightness(0.7) contrast(1.2);
}

/* Overlay for holographic effect */
.overlay{
  position:fixed;
  inset:0;
  background: linear-gradient(180deg, rgba(0,0,0,.1), rgba(0,0,0,.25));
  z-index:-1;
  pointer-events:none;
}

/* Center content */
.center{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:18px;
  text-align:center;
  perspective:1000px; /* for 3D transforms */
}

/* Content container */
.content{
  width:min(94vw,460px);
  transform-style:preserve-3d;
}

/* Hologram Logo */
.logo{
  width:160px;
  margin-bottom:18px;
  transform-origin:center;
  filter:
    drop-shadow(0 0 20px rgba(79,124,255,0.8))
    drop-shadow(0 0 30px rgba(0,229,255,0.6));
  position:relative;
  animation:holoFloat 4s ease-in-out infinite, holoGlow 2s alternate infinite;
  transform-style:preserve-3d;
  cursor:pointer;
}

@keyframes holoFloat{
  0%{transform:translateY(0px) rotateY(0deg)}
  50%{transform:translateY(-10px) rotateY(10deg)}
  100%{transform:translateY(0px) rotateY(0deg)}
}

@keyframes holoGlow{
  0%{filter:drop-shadow(0 0 25px rgba(79,124,255,0.7))}
  100%{filter:drop-shadow(0 0 55px rgba(0,229,255,0.9))}
}

.logo::after{
  content:"";
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background:linear-gradient(120deg, transparent, rgba(0,229,255,.5), transparent);
  mix-blend-mode:screen;
  animation:holoScan 3s linear infinite;
}

@keyframes holoScan{
  0%{transform:translateX(-120%)}
  100%{transform:translateX(120%)}
}

/* Typing text */
.type{
  min-height:36px;
  font-size:1.2rem;
  font-weight:800;
  letter-spacing:.06em;
  color:var(--cyan);
  margin-bottom:10px;
  text-shadow:
    0 2px 12px rgba(0,229,255,.7),
    0 0 22px rgba(79,124,255,.6);
}

/* Title & tagline */
h1{
  margin:8px 0 4px;
  font-size:1.8rem;
  letter-spacing:.08em;
  color:var(--cyan);
  text-shadow:0 2px 12px rgba(0,229,255,.6), 0 0 28px rgba(79,124,255,.5);
}

.tagline{
  font-size:1rem;
  font-weight:600;
  color:var(--text);
  margin:6px 0 18px;
  text-shadow:0 2px 12px rgba(0,229,255,.4);
}

/* Buttons grid */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:12px;
}

.btn{
  padding:14px 12px;
  border-radius:14px;
  border:1px solid rgba(0,229,255,.7);
  background:rgba(0,0,0,.6);
  color:var(--cyan);
  text-decoration:none;
  font-size:.95rem;
  font-weight:700;
  transition:transform .12s ease, box-shadow .12s ease, background .3s;
  box-shadow:0 6px 20px rgba(0,229,255,.2);
}

.btn:hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 12px 28px rgba(0,229,255,.4);
  background:rgba(0,0,0,.8);
}

.save{
  grid-column:span 2;
  background:linear-gradient(135deg,var(--cyan),var(--blue));
  color:var(--text);
  border:none;
}

/* Light streaks */
.light-streak{
  position:absolute;
  width:2px; height:120%;
  background:linear-gradient(to bottom, transparent, rgba(0,229,255,.6), transparent);
  top:-10%; left:50%;
  transform:rotate(30deg) translateX(-50%);
  animation:streakMove 2s linear infinite;
  pointer-events:none;
  z-index:-1;
}

@keyframes streakMove{
  0%{transform:translateY(-100%) rotate(30deg)}
  100%{transform:translateY(100%) rotate(30deg)}
}

</style>
</head>
<body>

<video class="bg-video" autoplay muted loop playsinline>
  <source src="bg.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div class="center">
  <div class="content">

    <img src="logo.png" alt="Logo" class="logo" id="logo">

    <div id="type" class="type"></div>

    <h1>Your Futuristic Brand</h1>
    <div class="tagline">We build smart digital experiences</div>

    <div class="grid">
      <a class="btn" href="tel:+447877810779">📞 Call</a>
      <a class="btn" href="mailto:jas@jappfinancial.co.uk">📧 Email</a>
      <a class="btn" href="https://x.com/yourhandle" target="_blank">🐦 X</a>
      <a class="btn" href="https://facebook.com/yourpage" target="_blank">📘 Facebook</a>
      <a class="btn" href="https://www.instagram.com/japp_financial" target="_blank">📸 Instagram</a>
      <a class="btn" href="https://yourwebsite.com" target="_blank">🌐 Website</a>
      <a class="btn" href="https://linkedin.com/in/yourprofile" target="_blank">💼 LinkedIn</a>
      <a class="btn" href="https://wa.me/447877810779" target="_blank">💬 WhatsApp</a>
      <a class="btn save" href="contact.vcf">💾 Save Contact</a>
    </div>

  </div>
</div>

<script>
// Typing effect
const lines = [
  "JAPP Financial",
  "Your Futuristic Brand",
  "We build smart digital experiences"
];
let i=0, j=0, del=false;
const el=document.getElementById("type");

(function loop(){
  const text=lines[i];
  if(!del){
    el.textContent=text.slice(0,++j);
    if(j===text.length) setTimeout(()=>del=true,1000);
  } else {
    el.textContent=text.slice(0,--j);
    if(j===0){ del=false; i=(i+1)%lines.length; }
  }
  setTimeout(loop, del?40:60);
})();

// Speech - must be user initiated
const logo = document.getElementById("logo");
logo.addEventListener("click", () => {
  const msg = new SpeechSynthesisUtterance(
    "Welcome to JAPP Financial futuristic digital card. We build smart AI powered digital experiences. Call, email or visit our website to connect instantly."
  );
  msg.lang = "en-US";
  speechSynthesis.speak(msg);
});
</script>

</body>
</html>
