<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JAPP Financial</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Orbitron',sans-serif;
color:white;
text-align:center;
overflow-x:hidden;
background:black;
}

/* VIDEO BACKGROUND */

.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* DARK OVERLAY */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:-1;
}

/* MAIN CARD */

.container{

width:92%;
max-width:420px;

margin:auto;
padding-top:40px;
padding-bottom:40px;

}

/* LOGO */

.logo{
width:150px;
margin:auto;
display:block;
margin-bottom:20px;
cursor:pointer;

filter:
drop-shadow(0 0 20px #00e5ff)
drop-shadow(0 0 40px #4f7cff);

animation:float 4s infinite ease-in-out;
}

@keyframes float{

0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}

}

/* TEXT */

.type{
font-size:18px;
margin-bottom:10px;
color:#00e5ff;
min-height:24px;
}

h1{
font-size:26px;
margin-bottom:8px;
}

.tagline{
font-size:14px;
margin-bottom:25px;
opacity:.9;
}

/* BUTTON GRID */

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;

}

/* BUTTON */

.btn{

display:flex;
align-items:center;
justify-content:center;

padding:14px;

border-radius:12px;

text-decoration:none;

font-size:15px;

color:white;

background:rgba(255,255,255,0.08);

border:1px solid rgba(255,255,255,0.25);

backdrop-filter:blur(10px);

transition:0.2s;

}

.btn:hover{

transform:translateY(-3px);

background:rgba(255,255,255,0.15);

}

/* SAVE BUTTON */

.save{

grid-column:span 2;

background:linear-gradient(135deg,#00e5ff,#4f7cff);

border:none;

color:white;

}

</style>

</head>

<body>

<!-- VIDEO -->

<video class="bg-video" autoplay muted loop playsinline preload="auto" poster="bg.jpg">
<source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

<img src="logo.png" class="logo" id="logo">

<div id="type" class="type"></div>

<h1>JAPP Financial</h1>

<div class="tagline">
We build smart digital experiences
</div>

<div class="grid">

<a class="btn" href="tel:+447877810779">📞 Call</a>

<a class="btn" href="mailto:jas@jappfinancial.co.uk">📧 Email</a>

<a class="btn" href="https://x.com" target="_blank">🐦 X</a>

<a class="btn" href="https://facebook.com" target="_blank">📘 Facebook</a>

<a class="btn" href="https://instagram.com/japp_financial" target="_blank">📸 Instagram</a>

<a class="btn" href="https://yourwebsite.com" target="_blank">🌐 Website</a>

<a class="btn" href="https://linkedin.com" target="_blank">💼 LinkedIn</a>

<a class="btn" href="https://wa.me/447877810779" target="_blank">💬 WhatsApp</a>

<a class="btn save" href="contact.vcf">💾 Save Contact</a>

</div>

</div>

<script>

/* typing animation */

const lines=[
"JAPP Financial",
"AI Powered Digital Card",
"Tap logo to hear voice"
];

let i=0;
let j=0;
let deleting=false;

const el=document.getElementById("type");

function type(){

let text=lines[i];

if(!deleting){

el.textContent=text.slice(0,++j);

if(j===text.length){

deleting=true;

setTimeout(type,1200);

return;

}

}else{

el.textContent=text.slice(0,--j);

if(j===0){

deleting=false;

i=(i+1)%lines.length;

}

}

setTimeout(type,60);

}

type();

/* logo voice */

document.getElementById("logo").onclick=function(){

const msg=new SpeechSynthesisUtterance(
"Welcome to JAPP Financial digital card."
);

speechSynthesis.speak(msg);

}

</script>

</body>
</html>
