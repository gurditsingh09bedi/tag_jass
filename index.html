<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futuristic Digital Card</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#4f7cff;
  --cyan:#00e5ff;
  --text:#f0f0f0;
  --bg:#020617;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  color:var(--text);
  text-align:center;
  background:var(--bg);
  overflow-x:hidden;
}

/* Background */
.bg-video{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  object-fit:cover;
  z-index:-2;
  filter:brightness(0.7) contrast(1.2);
}
.bg-fallback{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  object-fit:cover;
  z-index:-2;
}
.overlay{
  position:fixed;
  inset:0;
  background:linear-gradient(180deg, rgba(0,0,0,.1), rgba(0,0,0,.25));
  z-index:-1;
  pointer-events:none;
}

/* Center content */
.center{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:16px;
}

/* Content container */
.content{
  width:90%;
  max-width:460px;
  margin:auto;
}

/* Logo */
.logo{
  width:140px;
  margin-bottom:16px;
  cursor:pointer;
  filter:drop-shadow(0 0 20px rgba(79,124,255,0.8))
        drop-shadow(0 0 30px rgba(0,229,255,0.6));
  animation:holoFloat 4s ease-in-out infinite, holoGlow 2s alternate infinite;
}
@keyframes holoFloat{
  0%{transform:translateY(0px) rotateY(0deg)}
  50%{transform:translateY(-10px) rotateY(10deg)}
  100%{transform:translateY(0px) rotateY(0deg)}
}
@keyframes holoGlow{
  0%{filter:drop-shadow(0 0 25px rgba(79,124,255,0.7))}
  100%{filter:drop-shadow(0 0 55px rgba(0,229,255,0.9))}
}

/* Typing text */
.type{
  min-height:36px;
  font-size:1.1rem;
  font-weight:800;
  letter-spacing:.06em;
  color:var(--cyan);
  margin-bottom:10px;
  text-shadow:0 2px 12px rgba(0,229,255,.7),0 0 22px rgba(79,124,255,.6);
}

/* Title & tagline */
h1{ margin:8px 0 4px; font-size:1.6rem; letter-spacing:.08em; color:var(--cyan); text-shadow:0 2px 12px rgba(0,229,255,.6), 0 0 28px rgba(79,124,255,.5);}
.tagline{ font-size:0.95rem; font-weight:600; color:var(--text); margin:6px 0 18px; text-shadow:0 2px 12px rgba(0,229,255,.4); }

/* Buttons */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  width:100%;
}
.btn{
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(0,229,255,.7);
  background:rgba(0,0,0,.6);
  color:var(--cyan);
  text-decoration:none;
  font-weight:700;
  font-size:0.9rem;
  text-align:center;
  box-shadow:0 6px 20px rgba(0,229,255,.2);
  transition: transform .12s, box-shadow .12s, background .3s;
}
.btn:hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 12px 28px rgba(0,229,255,.4);
  background:rgba(0,0,0,.8);
}
.save{
  grid-column:span 2;
  background:linear-gradient(135deg,var(--cyan),var(--blue));
  color:var(--text);
  border:none;
}

/* Mobile adjustments */
@media (max-width:480px){
  h1{ font-size:1.4rem; }
  .tagline{ font-size:0.85rem; }
  .type{ font-size:1rem; }
  .grid{ grid-template-columns:1fr; gap:8px; }
  .btn, .save{ width:100%; }
  .logo{ width:120px; }
}
/* Hide video on mobile, show fallback */
@media (max-width:768px){
  .bg-video{ display:none; }
  .bg-fallback{ display:block; }
}
</style>
</head>
<body>

<video class="bg-video" autoplay muted loop playsinline>
  <source src="bg.mp4" type="video/mp4">
</video>
<img src="bg-fallback.jpg" class="bg-fallback" alt="Background">

<div class="overlay"></div>

<div class="center">
  <div class="content">
    <img src="logo.png" class="logo" id="logo" alt="Logo">
    <div id="type" class="type"></div>
    <h1>Your Futuristic Brand</h1>
    <div class="tagline">We build smart digital experiences</div>

    <div class="grid">
      <a class="btn" href="tel:+447877810779">📞 Call</a>
      <a class="btn" href="mailto:jas@jappfinancial.co.uk">📧 Email</a>
      <a class="btn" href="https://x.com/yourhandle" target="_blank">🐦 X</a>
      <a class="btn" href="https://facebook.com/yourpage" target="_blank">📘 Facebook</a>
      <a class="btn" href="https://www.instagram.com/japp_financial" target="_blank">📸 Instagram</a>
      <a class="btn" href="https://yourwebsite.com" target="_blank">🌐 Website</a>
      <a class="btn" href="https://linkedin.com/in/yourprofile" target="_blank">💼 LinkedIn</a>
      <a class="btn" href="https://wa.me/447877810779" target="_blank">💬 WhatsApp</a>
      <a class="btn save" href="contact.vcf">💾 Save Contact</a>
    </div>

  </div>
</div>

<script>
// Typing effect
const lines=["JAPP Financial","Your Futuristic Brand","We build smart digital experiences"];
let i=0,j=0,del=false;
const el=document.getElementById("type");
(function loop(){
  const text=lines[i];
  if(!del){ el.textContent=text.slice(0,++j); if(j===text.length) setTimeout(()=>del=true,1000);}
  else{ el.textContent=text.slice(0,--j); if(j===0){ del=false;i=(i+1)%lines.length; } }
  setTimeout(loop, del?40:60);
})();

// Logo tap triggers voice
document.getElementById("logo").addEventListener("click",()=>{
  const msg=new SpeechSynthesisUtterance("Welcome to JAPP Financial futuristic digital card. We build smart AI powered digital experiences. Call, email, or visit our website to connect instantly.");
  msg.lang="en-US"; speechSynthesis.speak(msg);
});
</script>

</body>
</html>
